<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>karljde.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #f0f0f0;
      border-radius: 50%;
      display: inline-block;
      margin: 0 4px;
      animation: blink 1.4s infinite both;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .dots-row {
      display: flex;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .domain {
      font-size: 0.85rem;
      color: #444;
      margin-top: 3rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Under Maintenance</h1>
    <p>My portfolio is getting a refresh — check back soon.</p>
    <div class="dots-row">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <p class="domain">karljde.com</p>
  </div>
</body>
</html>
